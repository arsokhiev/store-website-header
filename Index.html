<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>КанцПарк</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
<header>
    <section class="topbar">
        <div class="topbar_main">
            <div class="topbar_city">
                <img src="assets/gps_icon.svg" width="20" height="20">
                Махачкала
            </div>
            <div class="spacer"></div>
            <nav class="nav_topbar">
                <a href="#">Магазины</a>
                <a href="#">Покупателям
                    <img src="assets/arrow.svg" width="15" height="15">
                </a>
                <a href="#">Юридическим лицам
                    <img src="assets/arrow.svg" width="15" height="15">
                </a>
            </nav>
        </div>
        <div class="topbar_info">
            8-800-999-99-99 (с 03:00 до 22:00)
        </div>
    </section>
    <section class="header_main">
            <div class="logo">
                <a href="#">
                    <img src="assets/logo.svg" width="160">
                </a>
            </div>
            <div class="search">
                <input class="hoverable" type="text" placeholder="Быстрый поиск">
                <button class="btn_search">
                    <img src="assets/mag_glass.svg" width="20" height="20">
                </button>
            </div>
            <div class="actions">
                <a href="#" class="likable hoverable">
                    <img src="assets/heart.svg" width="20" height="20">
                    <span>Избранное</span>
                    <span class="counter">3</span>
                </a>
                <a href="#" class="likable hoverable">
                    <img src="assets/scales.svg" width="20" height="20">
                    <span>Сравнить</span>
                </a>
                <a href="#" class="likable hoverable">
                    <img src="assets/cart.svg" width="20" height="20">
                    <span>Корзина</span>
                    <span class="counter">7</span>
                </a>
            </div>
    </section>
    <section class="categories">
        <nav class="nav_categories">
            <a class="element" href="#" id="catalog">
                <img src="assets/catalog.svg">
                <span>Каталог</span>
            </a>
            <a class="element" href="#">
                <img src="assets/notebook.svg">
                <span>Бумажная продукция</span>
            </a>
            <a class="element" href="#">
                <img src="assets/briefcase.svg">
                <span>Товары для школы</span>
            </a>
            <a class="element" href="#">
                <img src="assets/pencil.svg">
                <span>Товары для творчества</span>
            </a>
            <a class="element" href="#">
                <img src="assets/abacus.svg">
                <span>Товары для торговли</span>
            </a>
            <a class="element" href="#" style=color:red>
                <img src="assets/sale.svg">
                <span>Скидки и акции</span>
            </a>
        </nav>
    </section>
</header>
</body>
</html>
